; Emergency StackChan Recovery Firmware Configuration
; Minimal configuration for device reset and recovery

[env:m5stack-cores3-safe]
platform = espressif32@6.3.2
board = esp32s3box
framework = arduino

; Conservative upload settings for recovery
upload_port = COM3
upload_speed = 9600          ; Start with lowest baud rate for safe recovery

; Safe build settings
board_build.arduino.memory_type = qio_qspi
board_build.f_flash = 80000000L
board_build.partitions = default_16MB.csv
board_build.filesystem = spiffs

; Minimal build flags for stability
build_flags =
    -DCORE_DEBUG_LEVEL=2      ; Reduced debug level for stability
    -DREALTIME_API
    -DARDUINO_M5STACK_CORES3
    -DARDUINOJSON_STRING_LENGTH_SIZE=4
    -std=gnu++17
    -DCONFIG_DISABLE_WIFI_POWER_SAVE=1
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10  ; Longer watchdog timeout

; Remove potentially unstable features
build_unflags =
    -std=gnu++11

; Essential library dependencies only
lib_deps =
    m5stack/M5Unified@^0.1.0
    bblanchon/ArduinoJson @ ^7

; Linker optimization
lib_ldf_mode = deep

; Safe upload protocol
upload_protocol = esptool